networks:
  paxos-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:
  server1:
    image: eclipse-temurin:17-jdk
    container_name: paxos-server-1
    working_dir: /app
    volumes:
      - ./target:/app
    command: ["java", "-Djava.net.preferIPv4Stack=true", "-Djava.net.preferIPv4Addresses=true", "-cp", "paxos-1.0-SNAPSHOT.jar", "rt4.paxos.PaxosProposer", "50051"]
    ports:
      - "50051:50051"
    networks:
      paxos-network:
        ipv4_address: 172.28.0.2

  server2:
    image: eclipse-temurin:17-jdk
    container_name: paxos-server-2
    working_dir: /app
    volumes:
      - ./target:/app
    command: ["java", "-Djava.net.preferIPv4Stack=true", "-Djava.net.preferIPv4Addresses=true", "-cp", "paxos-1.0-SNAPSHOT.jar", "rt4.paxos.PaxosProposer", "50052"]
    ports:
      - "50052:50052"
    networks:
      paxos-network:
        ipv4_address: 172.28.0.3
    depends_on:
      - server1

  server3:
    image: eclipse-temurin:17-jdk
    container_name: paxos-server-3
    working_dir: /app
    volumes:
      - ./target:/app
    command: ["java", "-Djava.net.preferIPv4Stack=true", "-Djava.net.preferIPv4Addresses=true", "-cp", "paxos-1.0-SNAPSHOT.jar", "rt4.paxos.PaxosProposer", "50053"]
    ports:
      - "50053:50053"
    networks:
      paxos-network:
        ipv4_address: 172.28.0.4
    depends_on:
      - server2

  acceptor:
    image: eclipse-temurin:17-jdk
    container_name: paxos-acceptor
    working_dir: /app
    volumes:
      - ./target:/app
    command: ["java", "-Djava.net.preferIPv4Stack=true", "-Djava.net.preferIPv4Addresses=true", "-cp", "paxos-1.0-SNAPSHOT.jar", "rt4.paxos.PaxosAcceptor"]
    networks:
      paxos-network:
        ipv4_address: 172.28.0.5
    depends_on:
      - server1
      - server2
      - server3